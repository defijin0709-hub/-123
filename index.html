<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>꿈 찾기 월드컵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; }
        .card-hover:hover { transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen flex items-center justify-center p-4">

    <div id="app" class="max-w-2xl w-full bg-white rounded-3xl shadow-xl p-6 sm:p-8">
        <!-- Start Screen -->
        <div id="start-screen" class="text-center">
            <h1 class="text-3xl font-bold text-indigo-800 mb-4">꿈 찾기 월드컵! 🚀</h1>
            <p class="text-gray-600 mb-8">3개의 직업 중 내가 가장 끌리는 직업을 골라보세요. 최종 결승을 통해 나에게 딱 맞는 미래 직업을 찾아봅니다!</p>
            <button onclick="startGame()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-10 rounded-full text-lg shadow-lg">시작하기</button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 id="round-title" class="text-xl font-bold text-indigo-900">1라운드</h2>
                <div id="progress" class="text-sm text-indigo-500"></div>
            </div>
            <div id="choices-container" class="grid grid-cols-1 gap-4">
                <!-- Choices will be injected here -->
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden text-center">
            <h2 class="text-2xl font-bold text-indigo-900 mb-6">최종 결과! 🎉</h2>
            <div id="winner-card" class="bg-indigo-100 p-6 rounded-2xl mb-6">
                <div id="winner-icon" class="text-6xl mb-4"></div>
                <h3 id="winner-name" class="text-2xl font-bold text-indigo-800 mb-2"></h3>
                <p id="winner-desc" class="text-gray-700"></p>
            </div>
            <button onclick="location.reload()" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-8 rounded-full">다시 하기</button>
        </div>
    </div>

    <script>
        const jobs = [
            { id: 1, name: "과학자", icon: "👨‍🔬", desc: "새로운 발견을 통해 세상을 더 편리하게 만들어요." },
            { id: 2, name: "소프트웨어 개발자", icon: "💻", desc: "컴퓨터 프로그램과 앱을 만드는 디지털 창조자예요." },
            { id: 3, name: "예술가", icon: "🎨", desc: "창의적인 생각으로 아름다운 작품을 그려내요." },
            { id: 4, name: "의사", icon: "🩺", desc: "아픈 사람을 치료하고 건강을 지켜줘요." },
            { id: 5, name: "건축가", icon: "🏗️", desc: "멋지고 튼튼한 건물과 도시를 설계해요." },
            { id: 6, name: "게임 디자이너", icon: "🎮", desc: "재미있고 흥미로운 게임 세상을 만들어요." },
            { id: 7, name: "인공지능 전문가", icon: "🤖", desc: "스스로 생각하는 컴퓨터 기술을 연구해요." },
            { id: 8, name: "음악가", icon: "🎵", desc: "사람들에게 감동을 주는 선율을 연주해요." },
            { id: 9, name: "작가", icon: "✍️", desc: "글로 사람들의 마음을 움직이는 이야기를 써요." },
            { id: 10, name: "유튜버", icon: "🎥", desc: "개성 넘치는 콘텐츠로 세상과 소통해요." },
            { id: 11, name: "패션 디자이너", icon: "👗", desc: "사람들에게 어울리는 멋진 옷을 디자인해요." },
            { id: 12, name: "요리사", icon: "🍳", desc: "맛있는 음식으로 사람들을 행복하게 해요." },
            { id: 13, name: "선생님", icon: "🍎", desc: "지식을 나누고 친구들의 꿈을 응원해요." },
            { id: 14, name: "조종사", icon: "✈️", desc: "하늘을 날며 세계 곳곳을 여행해요." },
            { id: 15, name: "경찰관", icon: "👮", desc: "우리 동네와 사회의 안전을 책임져요." },
            { id: 16, name: "소방관", icon: "🚒", desc: "위험으로부터 사람들을 용감하게 구해요." },
            { id: 17, name: "운동선수", icon: "🏃", desc: "끊임없는 노력으로 최고의 기록에 도전해요." },
            { id: 18, name: "심리학자", icon: "🧠", desc: "사람의 마음을 이해하고 도움을 줘요." },
            { id: 19, name: "농부", icon: "🌾", desc: "건강한 먹거리를 정성껏 길러내요." },
            { id: 20, name: "우주비행사", icon: "🚀", desc: "지구를 넘어 우주를 탐험해요." },
            { id: 21, name: "사업가", icon: "💼", desc: "새로운 가치를 창출하고 회사를 운영해요." },
            { id: 22, name: "수의사", icon: "🐾", desc: "동물들의 아픔을 치료하고 지켜줘요." },
            { id: 23, name: "외교관", icon: "🌍", desc: "나라를 대표해 세계 사람들과 친구가 돼요." },
            { id: 24, name: "환경운동가", icon: "🌱", desc: "깨끗하고 아름다운 지구를 지켜요." },
            { id: 25, name: "여행가이드", icon: "🗺️", desc: "세상의 멋진 곳을 소개하고 안내해요." },
            { id: 26, name: "사회복지사", icon: "🤝", desc: "도움이 필요한 이웃들에게 사랑을 전해요." },
            { id: 27, name: "요리 연구가", icon: "🥘", desc: "새로운 맛과 건강한 레시피를 탐구해요." }
        ];

        let currentPool = [...jobs];
        let nextPool = [];
        let round = 1;
        let groupIndex = 0;

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            renderRound();
        }

        function renderRound() {
            const container = document.getElementById('choices-container');
            container.innerHTML = '';
            
            // 3개씩 자르기
            const startIndex = groupIndex * 3;
            const choices = currentPool.slice(startIndex, startIndex + 3);

            // 라운드 이름 설정
            const totalRounds = 3; // 27 -> 9 -> 3 -> 1
            const roundNames = ["1라운드 (예선)", "2라운드 (준결승)", "최종 결승"];
            document.getElementById('round-title').innerText = roundNames[round - 1] || "결승전";
            document.getElementById('progress').innerText = `${groupIndex + 1} / ${Math.ceil(currentPool.length / 3)}`;

            choices.forEach(job => {
                const card = document.createElement('div');
                card.className = "bg-indigo-50 p-6 rounded-xl cursor-pointer card-hover border-2 border-indigo-200 hover:border-indigo-500";
                card.innerHTML = `
                    <div class="text-4xl mb-2">${job.icon}</div>
                    <h3 class="font-bold text-lg text-indigo-900">${job.name}</h3>
                    <p class="text-sm text-gray-600 mt-2">${job.desc}</p>
                `;
                card.onclick = () => selectJob(job);
                container.appendChild(card);
            });
        }

        function selectJob(job) {
            nextPool.push(job);
            groupIndex++;

            if (groupIndex >= Math.ceil(currentPool.length / 3)) {
                // 라운드 종료
                if (nextPool.length === 1) {
                    showResult(nextPool[0]);
                } else {
                    currentPool = [...nextPool];
                    nextPool = [];
                    groupIndex = 0;
                    round++;
                    renderRound();
                }
            } else {
                renderRound();
            }
        }

        function showResult(winner) {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('winner-icon').innerText = winner.icon;
            document.getElementById('winner-name').innerText = winner.name;
            document.getElementById('winner-desc').innerText = winner.desc;
        }
    </script>
</body>
</html>
